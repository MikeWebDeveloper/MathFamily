name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo run typecheck

      - run: pnpm turbo run test

      # Build catches Next.js/route regressions. The esbuild deadlock noted in
      # docs/engineering-notes.md is specific to the TB4 APFS volume — CI runs on
      # Ubuntu, so it builds cleanly. NEXT_PUBLIC_* vars fall back to localhost.
      - run: pnpm turbo run build

      # Playwright e2e is intentionally NOT run here (needs a live URL).
      # Run locally: cd apps/parkmath && pnpm e2e
